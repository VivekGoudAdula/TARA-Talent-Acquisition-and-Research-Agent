<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var t = localStorage.getItem('tara-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(t);
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tara.png" />
    <link rel="apple-touch-icon" href="/tara.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TARA — Targeted Acquisition &amp; Reach Agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
